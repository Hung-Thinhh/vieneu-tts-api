services:
  vietneu-tts:
    image: python:3.11-slim-bookworm
    working_dir: /app
    # Lệnh này sẽ tự cài đặt espeak-ng và khởi động API từ code có sẵn trên máy
    command: >
      bash -c "apt-get update && apt-get install -y espeak-ng && 
      pip install uv && uv sync && 
      PYTHONPATH=src .venv/bin/python run_api_server.py"
    volumes:
      - /root/VieNeu-TTS:/app
    restart: always
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vieneutts-api.rule=Host(`vieneutts.dukyai.com`)"
      - "traefik.http.routers.vieneutts-api.entrypoints=websecure"
      - "traefik.http.routers.vieneutts-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.vieneutts-api.service=vieneutts-api-svc"
      - "traefik.http.services.vieneutts-api-svc.loadbalancer.server.port=23333"

networks:
  dokploy-network:
    external: true
