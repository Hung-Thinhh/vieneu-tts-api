services:
  vietneu-tts:
    image: alpine/socat
    # Chuyển tiếp traffic từ Traefik → cổng 8000 trên máy chủ host
    command: TCP-LISTEN:8000,fork,reuseaddr TCP:host-gateway:8000
    extra_hosts:
      - "host-gateway:host-gateway"
    restart: always
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vieneutts-api.rule=Host(`vieneutts.dukyai.com`)"
      - "traefik.http.routers.vieneutts-api.entrypoints=websecure"
      - "traefik.http.routers.vieneutts-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.vieneutts-api.service=vieneutts-api-svc"
      - "traefik.http.services.vieneutts-api-svc.loadbalancer.server.port=8000"

networks:
  dokploy-network:
    external: true
